<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Shop</title>

<style>
body{margin:0;font-family:Arial;background:#0b0f0a;color:#fff}
header{padding:15px;background:#111;display:flex;justify-content:space-between;align-items:center}
h1{font-size:18px;margin:0;color:#7fff00}
button{cursor:pointer}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px}
.card{background:#151a12;border:1px solid #2a3a1f;border-radius:12px;padding:10px}
.card h3{margin:5px 0;font-size:14px}
.price{color:#7fff00;font-weight:bold}

.add{background:#7fff00;border:none;padding:6px 10px;border-radius:8px;margin-top:8px}

.cart{position:fixed;bottom:0;left:0;right:0;background:#111;padding:10px;border-top:2px solid #7fff00}
.cart button{width:100%;padding:12px;background:#7fff00;border:none;font-weight:bold}

.admin{display:none;padding:10px}
input{width:100%;padding:8px;margin:5px 0}
</style>
</head>

<body>

<header>
<h1>Mini Shop</h1>
<button onclick="toggleAdmin()">Admin</button>
</header>

<div class="grid" id="grid"></div>

<div class="cart">
Total: <span id="total">0</span>€
<button onclick="order()">Commander</button>
</div>

<div class="admin" id="admin">
<h3>Admin</h3>
<input id="name" placeholder="Nom">
<input id="price" placeholder="Prix">
<button onclick="addProduct()">Ajouter</button>
</div>

<script>
let products = [
{id:1,name:"Produit A",price:10},
{id:2,name:"Produit B",price:15},
{id:3,name:"Produit C",price:20}
];

let cart = {};

function render(){
const grid=document.getElementById("grid");
grid.innerHTML="";

products.forEach(p=>{
const div=document.createElement("div");
div.className="card";
div.innerHTML=`
<h3>${p.name}</h3>
<div class="price">${p.price}€</div>
<button class="add" onclick="add(${p.id})">Ajouter</button>
`;
grid.appendChild(div);
});
}

function add(id){
cart[id]=(cart[id]||0)+1;
updateTotal();
}

function updateTotal(){
let total=0;
for(let id in cart){
let p=products.find(x=>x.id==id);
total += p.price * cart[id];
}
document.getElementById("total").innerText=total;
}

function order(){
let msg="Commande:\n";
for(let id in cart){
let p=products.find(x=>x.id==id);
msg+=`- ${p.name} x${cart[id]}\n`;
}
msg+="Total: "+document.getElementById("total").innerText+"€";
window.open("https://t.me/TONUSERNAME?text="+encodeURIComponent(msg));
}

function toggleAdmin(){
document.getElementById("admin").style.display=
document.getElementById("admin").style.display==="block"?"none":"block";
}

function addProduct(){
let name=document.getElementById("name").value;
let price=parseFloat(document.getElementById("price").value);
products.push({id:Date.now(),name,price});
render();
}

render();
</script>

</body>
</html>
