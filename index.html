<!DOCTYPE html>

<head>

<title>Hash Farmer 64/40</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Exo+2:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--accent:#7fff00;--accent2:#39ff14;--dark:#050a00;--dark2:#0d1a03;--dark3:#162400;--card-bg:#0c1800;--border:#2a4a00;--text:#e8f5d0;--muted:#6a8a40}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--dark);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;overflow-x:hidden}
.header{position:sticky;top:0;z-index:100;background:rgba(5,10,0,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.logo-main{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);text-shadow:0 0 12px rgba(127,255,0,0.6);letter-spacing:2px;cursor:pointer}
.logo-sub{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:3px;text-transform:uppercase}
.cart-btn{position:relative;background:var(--dark3);border:1px solid var(--border);border-radius:12px;padding:8px 14px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px}

.cart-count{background:var(--accent);color:var(--dark);border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center}
.filters-wrap{padding:12px 16px 8px}
.filters-scroll{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.filters-scroll::-webkit-scrollbar{display:none}
.filter-chip{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--dark2);color:var(--muted);font-family:'Exo 2',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.2s}
.filter-chip.active{background:var(--accent);border-color:var(--accent);color:var(--dark);box-shadow:0 0 14px rgba(127,255,0,0.35)}
.banner{margin:0 16px 16px;border-radius:16px;background:linear-gradient(135deg,var(--dark3) 0%,#1a3000 100%);border:1px solid var(--border);padding:16px;position:relative;overflow:hidden}
.banner-tag{display:inline-block;background:var(--accent);color:var(--dark);font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;padding:2px 10px;border-radius:4px;margin-bottom:6px}

.section-title{padding:4px 16px 10px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--accent);display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent)}
.products-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 12px 100px}
.product-card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform 0.2s;animation:fadeUp 0.4s ease both}
.product-card:active{transform:scale(0.97)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.product-img{width:100%;aspect-ratio:1;background:var(--dark3);display:flex;align-items:center;justify-content:center;font-size:48px;position:relative;overflow:hidden}
.product-img img{width:100%;height:100%;object-fit:cover}

.product-badge{position:absolute;top:8px;left:8px;background:var(--accent);color:var(--dark);font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:1px;padding:2px 7px;border-radius:4px}
.product-badge.sold-out{background:#ff3a3a;color:#fff}
.product-info{padding:10px}
.product-name{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;color:#fff;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.price-tiers-grid{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(5,10,0,0.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;z-index:90}
